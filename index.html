<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport EKG & Atem Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #121212; color: #ffffff; text-align: center; padding: 15px; margin: 0;
        }
        h1 { color: #00e676; margin-bottom: 20px; font-size: 24px; }
        .btn {
            background-color: #333; color: white; border: none; padding: 15px 25px;
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer;
            margin: 10px; width: 85%; max-width: 300px; transition: 0.2s;
        }
        #btn-connect { background-color: #007bff; }
        #btn-start { background-color: #00e676; color: black; display: none; }
        #btn-stopp { background-color: #ff1744; display: none; }
        #status { color: #ffaa00; font-weight: bold; margin-top: 10px; font-size: 14px; }
        
        .data-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; max-width: 500px; margin: 20px auto; padding: 0 10px;
        }
        .card {
            background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px;
            padding: 15px 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 { margin: 0; font-size: 11px; color: #aaaaaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .card p { margin: 8px 0 0 0; font-size: 24px; font-weight: bold; color: #ffffff; }
        .card .sub-val { font-size: 12px; color: #00e676; margin-top: 4px; }
        .card .sub-val-blue { font-size: 12px; color: #00d2ff; margin-top: 4px; }
        
        .chart-container {
            background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px;
            max-width: 500px; margin: 15px auto; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>Sport EKG & Atem Tracker</h1>

    <button id="btn-connect" class="btn" onclick="verbinden()">Uhr koppeln</button>
    <div>
        <button id="btn-start" class="btn" onclick="sendeBefehl(1)">Start (Record)</button>
        <button id="btn-stopp" class="btn" onclick="sendeBefehl(0)">Stopp (Save & Sync)</button>
    </div>

    <p id="status">Status: Bereit</p>

    <div class="chart-container">
        <canvas id="ekgChart" style="width:100%; height:140px;"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="atemChart" style="width:100%; height:140px;"></canvas>
    </div>

    <div class="data-container">
        <div class="card">
            <h2>Puls (BPM)</h2>
            <p id="val-puls">--</p>
            <div class="sub-val" id="val-puls-stats">Ø: -- | Max: --</div>
        </div>
        <div class="card">
            <h2>Atmung (BRM)</h2>
            <p id="val-atmung" style="color: #00d2ff;">--</p>
            <div class="sub-val-blue" id="val-atmung-stats">Ø: --0</div>
        </div>
        <div class="card">
            <h2>Geschwindigkeit</h2>
            <p id="val-speed">0.0 <span style="font-size:12px;">km/h</span></p>
            <div class="sub-val" id="val-speed-avg">Ø: 0.0 km/h</div>
        </div>
        <div class="card">
            <h2>Distanz</h2>
            <p id="val-distanz">0.00 <span style="font-size:12px;">km</span></p>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "0000180d-0000-1000-8000-00805f9b34fb";
        const CHARACTERISTIC_UUID = "00002a37-0000-1000-8000-00805f9b34fb";

        let bluetoothGeraet = null;
        let bleCharakteristik = null;
        let amLaufen = false;

        let pulsListe = [];
        let speedListe = [];
        let atmungListe = [];
        let maxPuls = 0;

        // EKG Diagramm Setup
        const ctxEkg = document.getElementById('ekgChart').getContext('2d');
        const ekgChart = new Chart(ctxEkg, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ label: 'EKG Verlauf', data: Array(30).fill(null), borderColor: '#00e676', borderWidth: 2, pointRadius: 0, tension: 0.3 }] },
            options: { responsive: true, animation: false, scales: { y: { min: 40, max: 200, grid: { color: '#333' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });

        // Atem Diagramm Setup
        const ctxAtem = document.getElementById('atemChart').getContext('2d');
        const atemChart = new Chart(ctxAtem, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ label: 'Atemfrequenz', data: Array(30).fill(null), borderColor: '#00d2ff', borderWidth: 2, pointRadius: 0, tension: 0.3 }] },
            options: { responsive: true, animation: false, scales: { y: { min: 5, max: 50, grid: { color: '#333' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });

        async function verbinden() {
            const statusText = document.getElementById('status');
            statusText.innerText = "Suche nach Geräten...";
            try {
                bluetoothGeraet = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [SERVICE_UUID] });
                statusText.innerText = "Verbinde...";
                const server = await bluetoothGeraet.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharakteristik = await service.getCharacteristic(CHARACTERISTIC_UUID);

                await bleCharakteristik.startNotifications();
                bleCharakteristik.addEventListener('characteristicvaluechanged', datenEmpfangen);

                statusText.innerText = amLaufen ? "Wieder verbunden! Workout läuft..." : "Erfolgreich verbunden!";
                statusText.style.color = "#00e676";
                
                document.getElementById('btn-connect').style.display = 'none';
                document.getElementById('btn-start').style.display = amLaufen ? 'none' : 'inline-block';
                document.getElementById('btn-stopp').style.display = 'inline-block';
                bluetoothGeraet.addEventListener('gattserverdisconnected', onDisconnected);
            } catch (error) {
                statusText.innerText = "Verbindung fehlgeschlagen."; statusText.style.color = "#ff1744";
            }
        }

        function datenEmpfangen(event) {
            const value = event.target.value;
            if (value.byteLength < 5) return; // Erwartet jetzt mindestens 5 Bytes

            const typ = value.getUint8(0);
            const puls = value.getUint8(1);
            const speed = value.getUint8(2);
            const distanzRaw = value.getUint8(3);
            const atmung = value.getUint8(4); // NEU: Byte 4 ist die Atmung
            const distanz = distanzRaw / 10;

            if(typ === 0x99) {
                document.getElementById('status').innerText = "Synchronisiere Daten aus Flash...";
                document.getElementById('status').style.color = "#ffaa00";
            }

            // EKG Daten verarbeiten
            if (puls > 0) {
                pulsListe.push(puls);
                if (puls > maxPuls) maxPuls = puls;
                ekgChart.data.datasets[0].data.shift();
                ekgChart.data.datasets[0].data.push(puls);
                ekgChart.update();
            }

            // Atem Daten verarbeiten
            if (atmung > 0) {
                atmungListe.push(atmung);
                atemChart.data.datasets[0].data.shift();
                atemChart.data.datasets[0].data.push(atmung);
                atemChart.update();
            }
            if (speed > 0 || amLaufen) {
                speedListe.push(speed);
            }

            // Durchschnitte berechnen
            const avgPuls = pulsListe.length > 0 ? Math.round(pulsListe.reduce((a, b) => a + b) / pulsListe.length) : "--";
            const avgSpeed = speedListe.length > 0 ? (speedListe.reduce((a, b) => a + b) / speedListe.length).toFixed(1) : "0.0";
            const avgAtmung = atmungListe.length > 0 ? Math.round(atmungListe.reduce((a, b) => a + b) / atmungListe.length) : "--";

            // UI updaten
            document.getElementById('val-puls').innerText = puls > 0 ? puls : "--";
            document.getElementById('val-puls-stats').innerText = `Ø: ${avgPuls} | Max: ${maxPuls}`;
            
            document.getElementById('val-atmung').innerText = atmung > 0 ? atmung : "--";
            document.getElementById('val-atmung-stats').innerText = `Ø: ${avgAtmung} BRM`;
            
            document.getElementById('val-speed').innerHTML = `${speed.toFixed(1)} <span style="font-size:12px;">km/h</span>`;
            document.getElementById('val-speed-avg').innerText = `Ø: ${avgSpeed} km/h`;
            document.getElementById('val-distanz').innerHTML = `${distanz.toFixed(2)} <span style="font-size:12px;">km</span>`;
            
            if(typ === 0x99) {
                setTimeout(() => {
                    document.getElementById('status').innerText = "Synchronisation abgeschlossen. Training beendet.";
                    document.getElementById('status').style.color = "#00e676";
                }, 1000);
            }
        }

        async function sendeBefehl(wert) {
            const statusText = document.getElementById('status');
            if (wert === 0 && !bleCharakteristik) {
                statusText.innerText = "Bitte erst wieder KOPPELN!";
                statusText.style.color = "#ff1744";
                document.getElementById('btn-connect').style.display = 'inline-block';
                return;
            }
            if (!bleCharakteristik) return;

            try {
                const datenBefehl = new Uint8Array([wert]);
                await bleCharakteristik.writeValue(datenBefehl);
                
                if (wert === 1) {
                    amLaufen = true;
                    pulsListe = []; speedListe = []; atmungListe = []; maxPuls = 0; // Alle Listen resetten
                    statusText.innerText = "Training läuft...";
                    document.getElementById('btn-start').style.display = 'none';
                    document.getElementById('btn-stopp').style.display = 'inline-block';
                } else {
                    amLaufen = false;
                    statusText.innerText = "Training gestoppt und gespeichert.";
                    document.getElementById('btn-start').style.display = 'inline-block';
                    document.getElementById('btn-stopp').style.display = 'none';
                    document.getElementById('btn-connect').style.display = 'inline-block';
                }
            } catch (error) {
                console.error("Fehler beim Senden", error);
            }
        }

        function onDisconnected() {
            document.getElementById('status').innerText = "Verbindung weg (Du läufst autark).";
            document.getElementById('status').style.color = "#ffaa00";
            document.getElementById('btn-connect').style.display = 'inline-block';
            bleCharakteristik = null;
        }
    </script>
</body>
</html>
