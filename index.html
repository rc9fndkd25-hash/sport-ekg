<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartshirt-Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 15px; margin: 0; }
        h1 { color: #00e676; margin-bottom: 25px; font-size: 24px; }
        .btn { background-color: #333; color: white; border: none; padding: 15px 25px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px auto; width: 85%; max-width: 300px; transition: 0.2s; display: block; }
        #btn-connect { background-color: #007bff; display: inline-block; }
        #btn-start { background-color: #00e676; color: black; display: none; }
        #btn-stopp { background-color: #ff1744; display: none; }
        #btn-save { background-color: #ff9100; color: black; display: none; }
        #status { color: #ffaa00; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .settings-container, .export-container { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; max-width: 500px; margin: 10px auto; padding: 12px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .settings-title, .export-title { font-weight: bold; color: #aaaaaa; cursor: pointer; display: flex; justify-content: space-between; font-size: 14px; }
        .settings-content, .export-content { display: none; margin-top: 10px; }
        .settings-content label, .export-content label { display: inline-block; width: 100px; font-size: 13px; margin-bottom: 5px; }
        .settings-content input, .settings-content select, .export-content input { background: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; margin-bottom: 5px; width: 140px; }
        .btn-update-profile { background-color: #00e676; color: black; border: none; padding: 8px 12px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 5px; width: 100%; }
        .data-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; max-width: 500px; margin: 20px auto; padding: 0 10px; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 15px 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h2 { margin: 0; font-size: 11px; color: #aaaaaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .card p { margin: 8px 0 0 0; font-size: 24px; font-weight: bold; color: #ffffff; }
        .chart-container { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; max-width: 500px; margin: 15px auto; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        /* PRINT-LAYOUT: Hier wurde das PDF-Design für den Druck optimiert */
        @media print {
            body { background: white !important; color: black !important; padding: 20px; }
            #main-dashboard { display: none !important; }
            #pdf-layout { display: block !important; }
        }
        #pdf-layout { display: none; background: #ffffff; color: #000000; text-align: left; max-width: 600px; margin: 20px auto; padding: 25px; }
        .pdf-header { border-bottom: 3px solid #00e676; padding-bottom: 10px; margin-bottom: 20px; }
        .pdf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .pdf-card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
    </style>
</head>
<body>

    <div id="main-dashboard">
        <h1>Smartshirt-Tracker</h1>
        <div class="settings-container">
            <div class="settings-title" onclick="toggleSettings()">👤 Profil-Daten <span id="settings-arrow">▼</span></div>
            <div class="settings-content" id="settings-content">
                <label>Geschlecht:</label> <select id="user-gender"><option value="male">Männlich</option><option value="female">Weiblich</option></select><br>
                <label>Alter:</label> <input type="number" id="user-age" value="25"><br>
                <label>Gewicht (kg):</label> <input type="number" id="user-weight" value="75"><br>
                <button class="btn-update-profile" onclick="saveUserProfile()">Daten lokal merken</button>
            </div>
        </div>

        <button id="btn-connect" class="btn" onclick="verbinden()">Uhr koppeln</button>
        <button id="btn-start" class="btn" onclick="sendeBefehl(1)">Start (Record)</button>
        <button id="btn-stopp" class="btn" onclick="sendeBefehl(0)">Stopp (Save & Sync)</button>
        <button id="btn-save" class="btn" onclick="toggleExportBox()">📄 PDF Report erstellen</button>

        <div class="export-container" id="export-box" style="display: none; border-color: #ff9100;">
            <div class="export-title" style="color: #ff9100;">💾 Report festlegen</div>
            <div class="export-content" style="display: block;">
                <input type="text" id="pdf-filename-input" value="Workout"><br>
                <button class="btn-update-profile" style="background-color: #ff9100;" onclick="bereitePDFVor(); window.print();">PDF erzeugen</button>
            </div>
        </div>

        <p id="status">Status: Bereit</p>
        <div class="chart-container"><canvas id="ekgChart"></canvas></div>
        <div class="chart-container"><canvas id="atemChart"></canvas></div>

        <div class="data-container">
            <div class="card"><h2>Puls</h2><p id="val-puls">--</p></div>
            <div class="card"><h2>Atmung</h2><p id="val-atmung">--</p></div>
            <div class="card"><h2>Kcal</h2><p id="val-kcal">0</p></div>
            <div class="card"><h2>Distanz</h2><p id="val-distanz">0.00 km</p></div>
        </div>
    </div>

    <div id="pdf-layout">
        <div class="pdf-header">
            <h1 id="pdf-workout-name">Workout-Report</h1>
            <p id="pdf-datum">Datum: --</p>
            <p id="pdf-profil">--</p>
        </div>
        <div class="pdf-grid">
            <div class="pdf-card"><h3>Dauer</h3><p id="pdf-dauer">--</p></div>
            <div class="pdf-card"><h3>Kalorien</h3><p id="pdf-kcal">--</p></div>
            <div class="pdf-card"><h3>Max. Puls</h3><p id="pdf-max-puls">--</p></div>
            <div class="pdf-card"><h3>Ø Puls</h3><p id="pdf-avg-puls">--</p></div>
            <div class="pdf-card"><h3>Distanz</h3><p id="pdf-distanz">--</p></div>
            <div class="pdf-card"><h3>Ø Atmung</h3><p id="pdf-avg-atmung">--</p></div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "0000180d-0000-1000-8000-00805f9b34fb";
        const CHARACTERISTIC_UUID = "00002a37-0000-1000-8000-00805f9b34fb";
        let bluetoothGeraet, bleCharakteristik, pulsListe = [], speedListe = [], atmungListe = [];
        let maxPuls = 0, totalKcal = 0, finalDistance = 0, startTimeStamp = null, amLaufen = false;

        // Hier kommen deine gesamten Funktionen...
        async function verbinden() {
            try {
                bluetoothGeraet = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [SERVICE_UUID] });
                const server = await bluetoothGeraet.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharakteristik = await service.getCharacteristic(CHARACTERISTIC_UUID);
                await bleCharakteristik.startNotifications();
                bleCharakteristik.addEventListener('characteristicvaluechanged', datenEmpfangen);
                document.getElementById('status').innerText = "Erfolgreich verbunden!";
                document.getElementById('btn-connect').style.display = 'none';
                document.getElementById('btn-start').style.display = 'block';
            } catch(e) { console.error(e); }
        }

        function datenEmpfangen(event) {
            const val = event.target.value;
            const puls = val.getUint8(1);
            const atmung = val.getUint8(4);
            document.getElementById('val-puls').innerText = puls;
            document.getElementById('val-atmung').innerText = atmung;
            pulsListe.push(puls);
            if(puls > maxPuls) maxPuls = puls;
        }

        async function sendeBefehl(wert) {
            await bleCharakteristik.writeValue(new Uint8Array([wert]));
            if(wert === 0) document.getElementById('btn-save').style.display = 'block';
        }

        function bereitePDFVor() {
            document.getElementById('pdf-workout-name').innerText = document.getElementById('pdf-filename-input').value;
            document.getElementById('pdf-datum').innerText = "Datum: " + new Date().toLocaleDateString();
            document.getElementById('pdf-kcal').innerText = Math.round(totalKcal) + " kcal";
            document.getElementById('pdf-max-puls').innerText = maxPuls + " BPM";
            document.getElementById('pdf-avg-puls').innerText = (pulsListe.length > 0 ? Math.round(pulsListe.reduce((a,b)=>a+b)/pulsListe.length) : 0) + " BPM";
        }
        
        function toggleSettings() { document.getElementById('settings-content').style.display = document.getElementById('settings-content').style.display === 'block' ? 'none' : 'block'; }
        function toggleExportBox() { document.getElementById('export-box').style.display = document.getElementById('export-box').style.display === 'none' ? 'block' : 'none'; }
        function saveUserProfile() { localStorage.setItem('shirt_age', document.getElementById('user-age').value); alert("Daten gespeichert"); }
    </script>
</body>
</html>
