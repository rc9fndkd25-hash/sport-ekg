<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport EKG Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #00e676; margin-bottom: 30px; }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            width: 80%;
            max-width: 300px;
            transition: 0.2s;
        }
        #btn-connect { background-color: #007bff; }
        #btn-start { background-color: #00e676; color: black; display: none; }
        #btn-stopp { background-color: #ff1744; display: none; }
        
        .data-container {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            justify-items: center;
        }
        .card {
            background-color: #1e1e1e;
            border: 1fr solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 { margin: 0; font-size: 14px; color: #aaaaaa; text-transform: uppercase; }
        .card p { margin: 10px 0 0 0; font-size: 36px; font-weight: bold; color: #ffffff; }
        #status { color: #ffaa00; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>Sport EKG</h1>

    <button id="btn-connect" class="btn" onclick="verbinden()">1. Uhr koppeln</button>
    <div>
        <button id="btn-start" class="btn" onclick="sendeBefehl(1)">Start (Record)</button>
        <button id="btn-stopp" class="btn" onclick="sendeBefehl(0)">Stopp (Save)</button>
    </div>

    <p id="status">Status: Nicht verbunden</p>

    <div class="data-container">
        <div class="card">
            <h2>Puls</h2>
            <p id="val-puls">-- BPM</p>
        </div>
        <div class="card">
            <h2>Geschwindigkeit</h2>
            <p id="val-speed">0.0 km/h</p>
        </div>
        <div class="card">
            <h2>Distanz</h2>
            <p id="val-distanz">0.00 km</p>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "0000180d-0000-1000-8000-00805f9b34fb";
        const CHARACTERISTIC_UUID = "00002a37-0000-1000-8000-00805f9b34fb";

        let bluetoothGeraet = null;
        let bleCharakteristik = null;

        async function verbinden() {
            const statusText = document.getElementById('status');
            statusText.innerText = "Suche nach Sport_Uhr_Sensor...";

            try {
                // 1. Nach dem ESP32 scannen
                bluetoothGeraet = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Sport_Uhr_Sensor' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusText.innerText = "Verbinde mit Server...";
                const server = await bluetoothGeraet.gatt.connect();

                statusText.innerText = "Lade Service...";
                const service = await server.getPrimaryService(SERVICE_UUID);

                statusText.innerText = "Lade Datenkanal...";
                bleCharakteristik = await service.getCharacteristic(CHARACTERISTIC_UUID);

                // 2. Datenstrom abonnieren (Notifications)
                await bleCharakteristik.startNotifications();
                bleCharakteristik.addEventListener('characteristicvaluechanged', datenEmpfangen);

                statusText.innerText = "Erfolgreich verbunden!";
                statusText.style.color = "#00e676";
                
                // Buttons anzeigen
                document.getElementById('btn-connect').style.display = 'none';
                document.getElementById('btn-start').style.display = 'inline-block';
                document.getElementById('btn-stopp').style.display = 'inline-block';

                bluetoothGeraet.addEventListener('gattserverdisconnected', onDisconnected);

            } catch (error) {
                console.log(error);
                statusText.innerText = "Verbindung fehlgeschlagen.";
                statusText.style.color = "#ff1744";
            }
        }

        // 3. Daten vom ESP32 empfangen und aufteilen
        function datenEmpfangen(event) {
            const value = event.target.value;
            
            // Byte-Paket auslesen (Index startet bei JavaScript bei 0)
            const puls = value.getUint8(1);
            const speed = value.getUint8(2);
            const distanzRaw = value.getUint8(3);
            const distanz = distanzRaw / 10;

            // HTML Oberflaeche updaten
            document.getElementById('val-puls').innerText = puls > 0 ? puls + " BPM" : "-- BPM";
            document.getElementById('val-speed').innerText = speed.toFixed(1) + " km/h";
            document.getElementById('val-distanz').innerText = distanz.toFixed(2) + " km";
        }

        // 4. Start oder Stopp an den ESP32 senden
        async function sendeBefehl(wert) {
            if (!bleCharakteristik) return;
            try {
                const datenBefehl = new Uint8Array([wert]);
                await bleCharakteristik.writeValue(datenBefehl);
                document.getElementById('status').innerText = wert === 1 ? "Training läuft..." : "Training gestoppt.";
            } catch (error) {
                console.error("Senden fehlgeschlagen", error);
            }
        }

        function onDisconnected() {
            document.getElementById('status').innerText = "Verbindung verloren.";
            document.getElementById('status').style.color = "#ff1744";
            document.getElementById('btn-connect').style.display = 'inline-block';
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stopp').style.display = 'none';
        }
    </script>
</body>
</html>
